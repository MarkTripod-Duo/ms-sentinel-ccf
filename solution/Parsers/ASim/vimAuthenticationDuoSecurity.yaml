id: 10cb1a09-07d8-4b08-b27e-721f248ee614
Parser:
  Title: ASIM Authentication parser for Cisco Duo Security
  Version: '0.1.1'
  LastUpdated: Jun 09 2026
Product:
  Name: Cisco Duo Security
Normalization:
  Schema: Authentication
  Version: '0.1.3'
References:
- Title: ASIM Authentication Schema
  Link: https://aka.ms/ASimAuthenticationDoc
- Title: ASIM
  Link: https://aka.ms/AboutASIM
- Title: Cisco Duo Admin API
  Link: https://duo.com/docs/adminapi
Description: |
  This ASIM parser normalizes Cisco Duo Admin API v2 authentication logs (DuoSecurityAuthentication_CL),
  ingested via the Codeless Connector Framework, to the ASIM Authentication normalized schema.
ParserName: vimAuthenticationDuoSecurity
EquivalentBuiltInParser: _Im_Authentication_DuoSecurity
ParserParams:
  - Name: starttime
    Type: datetime
    Default: datetime(null)
  - Name: endtime
    Type: datetime
    Default: datetime(null)
  - Name: username_has_any
    Type: dynamic
    Default: dynamic([])
  - Name: targetappname_has_any
    Type: dynamic
    Default: dynamic([])
  - Name: srcipaddr_has_any_prefix
    Type: dynamic
    Default: dynamic([])
  - Name: srchostname_has_any
    Type: dynamic
    Default: dynamic([])
  - Name: eventtype_in
    Type: dynamic
    Default: dynamic([])
  - Name: eventresultdetails_in
    Type: dynamic
    Default: dynamic([])
  - Name: eventresult
    Type: string
    Default: '*'
  - Name: disabled
    Type: bool
    Default: false
ParserQuery: |
  let parser = (
      starttime: datetime=datetime(null),
      endtime: datetime=datetime(null),
      username_has_any: dynamic = dynamic([]),
      targetappname_has_any: dynamic = dynamic([]),
      srcipaddr_has_any_prefix: dynamic = dynamic([]),
      srchostname_has_any: dynamic = dynamic([]),
      eventtype_in: dynamic = dynamic([]),
      eventresultdetails_in: dynamic = dynamic([]),
      eventresult: string = '*',
      disabled: bool=false
      ) {
      DuoSecurityAuthentication_CL
      | where not(disabled)
          and (isnull(starttime) or TimeGenerated >= starttime)
          and (isnull(endtime) or TimeGenerated <= endtime)
      | extend _ad = column_ifexists('access_device', dynamic({})),
               _app = column_ifexists('application', dynamic({})),
               _usr = column_ifexists('user', dynamic({})),
               _reason = tostring(column_ifexists('reason', '')),
               _factor = tostring(column_ifexists('factor', ''))
      | extend TargetUsername = tostring(_usr.name),
               SrcIpAddr = tostring(_ad.ip),
               TargetAppName = tostring(_app.name)
      | where (array_length(username_has_any) == 0 or TargetUsername has_any (username_has_any))
          and (array_length(targetappname_has_any) == 0 or TargetAppName has_any (targetappname_has_any))
          and (array_length(srcipaddr_has_any_prefix) == 0 or has_any_ipv4_prefix(SrcIpAddr, srcipaddr_has_any_prefix))
          and (array_length(srchostname_has_any) == 0)
      | extend EventType = 'Logon',
               EventResult = iff(tostring(column_ifexists('result','')) =~ 'success', 'Success', 'Failure'),
               EventStartTime = TimeGenerated,
               EventEndTime = TimeGenerated,
               EventCount = int(1),
               EventProduct = 'Duo Security',
               EventVendor = 'Cisco',
               EventSchema = 'Authentication',
               EventSchemaVersion = '0.1.3',
               EventOriginalUid = tostring(column_ifexists('txid','')),
               TargetUserId = tostring(_usr.key),
               TargetUserIdType = iff(isnotempty(tostring(_usr.key)), 'Other', ''),
               TargetUsernameType = iff(tostring(_usr.name) has '@', 'UPN', 'Simple'),
               SrcGeoCountry = tostring(_ad.location.country),
               SrcGeoCity = tostring(_ad.location.city)
      | extend ActorUsername = TargetUsername,
               ActorUsernameType = TargetUsernameType,
               User = TargetUsername,
               Dvc = SrcIpAddr,
               IpAddr = SrcIpAddr,
               DvcIpAddr = SrcIpAddr,
               Src = SrcIpAddr,
               Application = TargetAppName,
               TargetAppType = 'Service',
               EventSeverity = iff(EventResult =~ 'Success', 'Informational', 'Low'),
               EventUid = EventOriginalUid,
               EventResultDetails = case(
                   EventResult =~ 'Success', '',
                   _reason == 'locked_out', 'User locked',
                   _reason == 'user_disabled', 'User disabled',
                   _reason in ('out_of_date', 'denied_by_policy', 'user_not_in_permitted_group', 'anomalous_push', 'no_keys_available'), 'Logon violates policy',
                   _reason == 'deny_unenrolled_user', 'No such user',
                   'Other'),
               LogonMethod = case(
                   _factor in ('webauthn_credential', 'u2f_token', 'yubikey_code', 'fido2'), 'Passwordless',
                   'Multi factor authentication'),
               AdditionalFields = bag_pack('DuoFactor', _factor, 'DuoReason', _reason)
      | where (array_length(eventtype_in) == 0 or EventType in~ (eventtype_in))
          and (array_length(eventresultdetails_in) == 0 or EventResultDetails in~ (eventresultdetails_in))
          and (eventresult == '*' or EventResult == eventresult)
      | project-away _ad, _app, _usr, _reason, _factor
  };
  parser(
      starttime=starttime,
      endtime=endtime,
      username_has_any=username_has_any,
      targetappname_has_any=targetappname_has_any,
      srcipaddr_has_any_prefix=srcipaddr_has_any_prefix,
      srchostname_has_any=srchostname_has_any,
      eventtype_in=eventtype_in,
      eventresultdetails_in=eventresultdetails_in,
      eventresult=eventresult,
      disabled=disabled
  )
