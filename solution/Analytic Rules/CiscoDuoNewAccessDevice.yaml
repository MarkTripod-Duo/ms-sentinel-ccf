id: 9ac650a8-fe3e-4c6c-8cf6-73982a322e73
name: Cisco Duo - New access device
description: |
  'Detects new access device.'
severity: Medium
status: Available
requiredDataConnectors:
  - connectorId: DuoSecurityCCF
    dataTypes:
      - CiscoDuo
  - connectorId: CiscoDuoSecurity
    dataTypes:
      - CiscoDuo
queryFrequency: 1h
queryPeriod: 14d
triggerOperator: gt
triggerThreshold: 0
tactics:
  - InitialAccess
relevantTechniques:
  - T1078
query: |
  CiscoDuo
  | where EventType =~ 'authentication'
  | where EventResult =~ 'success'
  | where isnotempty(AccessDvcIpAddr)
  | summarize dvc_ip = makeset(AccessDvcIpAddr) by DstUserName
  | join (CiscoDuo
          | where EventType =~ 'authentication'
          | where EventResult =~ 'success') on DstUserName
  | where dvc_ip !has AccessDvcIpAddr
  | extend IPCustomEntity = AccessDvcIpAddr, AccountCustomEntity = DstUserName
entityMappings:
  - entityType: IP
    fieldMappings:
      - identifier: Address
        columnName: IPCustomEntity
  - entityType: Account
    fieldMappings:
      - identifier: Name
        columnName: AccountCustomEntity
version: 1.0.0
kind: Scheduled