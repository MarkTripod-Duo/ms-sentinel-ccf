id: 7f10ca83-dd23-45fc-8aac-291d3195d641
name: Cisco Duo - Admin failure authentications
description: |
  'Query searches admin failure authentication events.'
severity: Medium
requiredDataConnectors:
  - connectorId: DuoSecurityCCF
    dataTypes:
      - CiscoDuo
  - connectorId: CiscoDuoSecurity
    dataTypes:
      - CiscoDuo
tactics:
  - InitialAccess
relevantTechniques:
  - T1078
query: |
  CiscoDuo
  | where TimeGenerated > ago(24h)
  | where DvcAction =~ "admin_login_error"
  | project TimeGenerated, SrcIpAddr, DstUserName
  | extend AccountCustomEntity = DstUserName, IPCustomEntity = SrcIpAddr
entityMappings:
  - entityType: Account
    fieldMappings:
      - identifier: Name
        columnName: AccountCustomEntity
  - entityType: IP
    fieldMappings:
      - identifier: Address
        columnName: IPCustomEntity
