id: 524069d3-0fb0-4e31-b9c3-87bac7a8f132
name: Cisco Duo - Delete actions
description: |
  'Query searches for delete actions performed by admin users - any Duo administrative action whose name contains "delete" (e.g. user_delete, group_delete, integration_delete), which is robust across the v1 administrator-log and v2 activity-log action taxonomies.'
severity: Medium
requiredDataConnectors:
  - connectorId: DuoSecurityCCF
    dataTypes:
      - CiscoDuo
  - connectorId: CiscoDuoSecurity
    dataTypes:
      - CiscoDuo
tactics:
  - Impact
relevantTechniques:
  - T1531
query: |
  CiscoDuo
  | where TimeGenerated > ago(24h)
  | where DvcAction contains "delete"
  | project TimeGenerated, DvcAction, SrcUserName, DstUserName, SrcIpAddr
  | extend AccountCustomEntity = SrcUserName, IPCustomEntity = SrcIpAddr
entityMappings:
  - entityType: Account
    fieldMappings:
      - identifier: Name
        columnName: AccountCustomEntity
  - entityType: IP
    fieldMappings:
      - identifier: Address
        columnName: IPCustomEntity
